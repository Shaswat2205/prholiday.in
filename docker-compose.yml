version: '3.9'

services:
  # ── Main Application (Frontend + Backend Built Together) ───────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - server/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379/
      # Make sure your server/.env has the MongoDB Atlas URI!
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/server/uploads
      - ./client/public/videos:/app/client/public/videos
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Caching & Background Jobs ─────────────────────────────────────
  redis:
    image: 'redis:7-alpine'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Reverse Proxy (SSL & Domain Routing) ──────────────────────────
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'    # Public HTTP
      - '81:81'    # Admin Web Interface
      - '443:443'  # Public HTTPS
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  npm_data:
  npm_letsencrypt:
  uploads_data:
